<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="รายชื่อ">
<meta name="theme-color" content="#0f1117">
<title>List รายชื่อ</title>
<link rel="manifest" id="pwa-manifest">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3350;
    --accent: #f59e0b;
    --accent2: #fbbf24;
    --text: #e8eaf6;
    --muted: #7c83a8;
    --danger: #ef4444;
    --success: #22c55e;
    --info: #3b82f6;
    --purple: #a855f7;
    --radius: 12px;
    --shadow: 0 4px 24px rgba(0,0,0,0.4);
  }

  body {
    font-family: 'Sarabun', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 15px;
    padding-bottom: env(safe-area-inset-bottom);
  }

  /* HEADER */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px;
    padding-top: calc(16px + env(safe-area-inset-top));
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header h1 {
    font-size: 20px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.5px;
  }
  .header-actions { display: flex; gap: 8px; }

  /* MAIN */
  .main {
    padding: 20px;
    max-width: 1100px;
    margin: 0 auto;
  }

  /* CATEGORY */
  .category-block {
    margin-bottom: 28px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .category-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    background: var(--surface2);
    cursor: pointer;
    user-select: none;
  }
  .category-title {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 600;
    font-size: 15px;
  }
  .category-badge {
    background: var(--accent);
    color: #000;
    border-radius: 20px;
    padding: 2px 10px;
    font-size: 12px;
    font-weight: 700;
  }
  .category-actions { display: flex; gap: 6px; }
  .chevron {
    font-size: 18px;
    color: var(--muted);
    transition: transform 0.2s;
  }
  .chevron.open { transform: rotate(180deg); }

  /* TABLE */
  .table-wrap { overflow-x: auto; }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  thead tr { background: rgba(255,255,255,0.03); }
  th {
    padding: 10px 12px;
    text-align: left;
    color: var(--muted);
    font-weight: 500;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  tbody tr {
    border-bottom: 1px solid rgba(46,51,80,0.5);
    transition: background 0.15s;
    cursor: pointer;
  }
  tbody tr:hover { background: rgba(245,158,11,0.05); }
  td {
    padding: 10px 12px;
    vertical-align: middle;
  }
  .seq-num {
    color: var(--muted);
    font-size: 12px;
    font-weight: 600;
    width: 40px;
  }
  .name-cell {
    font-weight: 600;
    color: var(--text);
    min-width: 100px;
  }

  /* RATING DOTS */
  .rating-bar {
    display: flex;
    gap: 3px;
    align-items: center;
  }
  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--border);
  }
  .dot.active { background: var(--success); }
  .dot.r1 { background: var(--success); }
  .dot.r2 { background: var(--accent); }
  .dot.r3 { background: var(--info); }
  .dot.r4 { background: var(--purple); }

  /* SCORE LABEL */
  .score-tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 600;
  }
  .score-high { background: rgba(34,197,94,0.15); color: #22c55e; }
  .score-mid  { background: rgba(245,158,11,0.15); color: #f59e0b; }
  .score-low  { background: rgba(239,68,68,0.15);  color: #ef4444; }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 36px 20px;
    color: var(--muted);
  }
  .empty-state .icon { font-size: 36px; margin-bottom: 10px; }

  /* BUTTONS */
  .btn {
    border: none;
    cursor: pointer;
    font-family: 'Sarabun', sans-serif;
    font-size: 13px;
    border-radius: 8px;
    padding: 8px 16px;
    font-weight: 500;
    transition: opacity 0.15s, transform 0.1s;
  }
  .btn:hover { opacity: 0.85; }
  .btn:active { transform: scale(0.97); }
  .btn-accent { background: var(--accent); color: #000; }
  .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
  .btn-ghost { background: transparent; color: var(--muted); padding: 5px 9px; }
  .btn-ghost:hover { color: var(--text); background: rgba(255,255,255,0.06); }
  .btn-danger { background: rgba(239,68,68,0.15); color: var(--danger); border: none; }
  .btn-sm { padding: 5px 10px; font-size: 12px; }

  /* MODAL OVERLAY */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .overlay.show { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    width: 100%;
    max-width: 600px;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: var(--shadow);
    transform: translateY(16px);
    transition: transform 0.2s;
  }
  .overlay.show .modal { transform: translateY(0); }
  .modal-header {
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    background: var(--surface);
    z-index: 1;
  }
  .modal-header h2 { font-size: 17px; font-weight: 700; }
  .modal-body { padding: 20px 24px; }
  .modal-footer {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 8px;
    justify-content: flex-end;
  }

  /* FORM */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-grid.single { grid-template-columns: 1fr; }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-group.full { grid-column: 1 / -1; }
  label { font-size: 12px; color: var(--muted); font-weight: 500; }
  input, select, textarea {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Sarabun', sans-serif;
    font-size: 14px;
    border-radius: 8px;
    padding: 9px 12px;
    outline: none;
    transition: border-color 0.15s;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--accent); }
  textarea { resize: vertical; min-height: 70px; }
  select option { background: var(--surface2); }

  /* RATING SELECTOR */
  .rating-select {
    display: flex;
    flex-wrap: wrap;
    gap: 2px;
  }
  .rating-select .star {
    font-size: 16px;
    cursor: pointer;
    color: var(--border);
    transition: color 0.1s, transform 0.1s;
  }
  .rating-select .star:hover,
  .rating-select .star.on { color: var(--accent); }
  .rating-select .star:hover { transform: scale(1.2); }

  /* DETAIL VIEW */
  .detail-tabs {
    display: flex;
    gap: 4px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 0;
    margin-bottom: 20px;
    overflow-x: auto;
  }
  .detail-tab {
    padding: 8px 14px;
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    white-space: nowrap;
    transition: color 0.15s;
  }
  .detail-tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }
  .detail-tab:hover { color: var(--text); }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  .info-row {
    display: flex;
    flex-direction: column;
    gap: 3px;
    margin-bottom: 16px;
  }
  .info-row label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .info-row .val { font-size: 15px; }

  .profile-top {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px 0;
    margin-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }
  .avatar {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--purple));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    font-weight: 700;
    color: #000;
    flex-shrink: 0;
  }
  .profile-name { font-size: 20px; font-weight: 700; }
  .profile-meta { font-size: 13px; color: var(--muted); }

  .ratings-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 16px;
  }
  .rating-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
  }
  .rating-card .r-label { font-size: 11px; color: var(--muted); margin-bottom: 6px; }
  .rating-card .r-stars { font-size: 18px; }

  .note-block {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 12px;
    font-size: 14px;
    line-height: 1.6;
    color: var(--text);
    white-space: pre-wrap;
  }
  .note-empty { color: var(--muted); font-style: italic; font-size: 13px; }

  .section-title {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--muted);
    font-weight: 600;
    margin-bottom: 8px;
  }

  /* SEARCH */
  .search-wrap {
    position: relative;
    margin-bottom: 20px;
  }
  .search-wrap input {
    width: 100%;
    padding-left: 36px;
  }
  .search-icon {
    position: absolute;
    left: 11px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 16px;
    pointer-events: none;
  }

  .no-results { color: var(--muted); text-align: center; padding: 30px; font-size: 14px; }

  /* SORTABLE CATEGORY LIST */
  .cat-sort-item {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    margin-bottom: 7px;
    cursor: grab;
    user-select: none;
    transition: background 0.15s, box-shadow 0.15s;
  }
  .cat-sort-item:active { cursor: grabbing; }
  .cat-sort-item.drag-over { box-shadow: 0 0 0 2px var(--accent); background: rgba(245,158,11,0.08); }
  .cat-sort-item.dragging { opacity: 0.4; }
  .drag-handle { color: var(--muted); font-size: 16px; cursor: grab; flex-shrink: 0; }
  .cat-sort-name { flex: 1; font-size: 14px; font-weight: 500; }
  .cat-sort-count { font-size: 11px; color: var(--muted); background: var(--border); border-radius: 10px; padding: 2px 8px; }

  @media (max-width: 640px) {
    .form-grid { grid-template-columns: 1fr; }
    .ratings-grid { grid-template-columns: 1fr; }
    .main { padding: 12px; }
    th, td { padding: 8px 8px; font-size: 12px; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>📋 List รายชื่อ</h1>
  <div class="header-actions">
    <button class="btn btn-ghost btn-sm" id="installBtn" style="display:none" onclick="installPWA()">📲 ติดตั้ง</button>
    <button class="btn btn-outline btn-sm" onclick="openManageCategories()">⚙️ หมวดหมู่</button>
    <button class="btn btn-accent btn-sm" onclick="openAddContact()">+ เพิ่มรายชื่อ</button>
  </div>
</div>

<div class="main">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="ค้นหาชื่อ..." oninput="renderAll()">
  </div>
  <div id="categoriesContainer"></div>
</div>

<!-- ADD/EDIT CONTACT MODAL -->
<div class="overlay" id="contactModal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="contactModalTitle">เพิ่มรายชื่อใหม่</h2>
      <button class="btn btn-ghost" onclick="closeModal('contactModal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-group">
          <label>ชื่อ *</label>
          <input type="text" id="f_name" placeholder="ชื่อ-นามสกุล">
        </div>
        <div class="form-group">
          <label>อายุ</label>
          <input type="number" id="f_age" placeholder="อายุ" min="1" max="99">
        </div>
        <div class="form-group">
          <label>เรียน / ทำงาน</label>
          <input type="text" id="f_status" placeholder="เช่น ทำงานโรงงาน, นักศึกษา...">
        </div>
        <div class="form-group">
          <label>หมวดหมู่</label>
          <select id="f_category"></select>
        </div>
        <div class="form-group full">
          <label>อยู่มากี่ปี / จบอะไรมา</label>
          <input type="text" id="f_background" placeholder="เช่น อยู่มา 3 ปี / ป.ตรี วิศวะ">
        </div>
      </div>

      <div style="margin: 16px 0 8px;">
        <div class="section-title">⭐ ให้คะแนน (1–10)</div>
        <div class="ratings-grid">
          <div class="rating-card">
            <div class="r-label">Active (ความกระตือรือร้น)</div>
            <div class="rating-select" id="rs_active" data-field="active"></div>
          </div>
          <div class="rating-card">
            <div class="r-label">Friendly (ความเป็นมิตร)</div>
            <div class="rating-select" id="rs_friendly" data-field="friendly"></div>
          </div>
          <div class="rating-card">
            <div class="r-label">Money (ฐานะการเงิน)</div>
            <div class="rating-select" id="rs_money" data-field="money"></div>
          </div>
          <div class="rating-card">
            <div class="r-label">Relation (ความสัมพันธ์)</div>
            <div class="rating-select" id="rs_relation" data-field="relation"></div>
          </div>
        </div>
      </div>

      <div class="form-grid single">
        <div class="form-group">
          <label>หมายเหตุทั่วไป</label>
          <textarea id="f_note" placeholder="บันทึกเพิ่มเติม..."></textarea>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('contactModal')">ยกเลิก</button>
      <button class="btn btn-accent" onclick="saveContact()">💾 บันทึก</button>
    </div>
  </div>
</div>

<!-- DETAIL VIEW MODAL -->
<div class="overlay" id="detailModal">
  <div class="modal" style="max-width:640px">
    <div class="modal-header">
      <h2 id="detailTitle">รายละเอียด</h2>
      <button class="btn btn-ghost" onclick="closeModal('detailModal')">✕</button>
    </div>
    <div class="modal-body" id="detailBody"></div>
    <div class="modal-footer">
      <button class="btn btn-danger btn-sm" onclick="deleteCurrentContact()">🗑 ลบ</button>
      <button class="btn btn-outline" onclick="closeModal('detailModal')">ปิด</button>
      <button class="btn btn-accent" onclick="editCurrentContact()">✏️ แก้ไข</button>
    </div>
  </div>
</div>

<!-- ADD CATEGORY MODAL -->
<div class="overlay" id="categoryModal">
  <div class="modal" style="max-width:400px">
    <div class="modal-header">
      <h2 id="catModalTitle">เพิ่มหมวดหมู่</h2>
      <button class="btn btn-ghost" onclick="closeModal('categoryModal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>ชื่อหมวดหมู่ *</label>
        <input type="text" id="f_catName" placeholder="เช่น คนในออฟฟิศ, เพื่อนยิม...">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('categoryModal')">ยกเลิก</button>
      <button class="btn btn-accent" onclick="saveCategory()">💾 บันทึก</button>
    </div>
  </div>
</div>

<!-- CONFIRM DELETE MODAL -->
<div class="overlay" id="confirmModal">
  <div class="modal" style="max-width:360px">
    <div class="modal-header">
      <h2>ยืนยันการลบ</h2>
      <button class="btn btn-ghost" onclick="closeModal('confirmModal')">✕</button>
    </div>
    <div class="modal-body">
      <p id="confirmMsg" style="font-size:15px;line-height:1.6"></p>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('confirmModal')">ยกเลิก</button>
      <button class="btn btn-danger" id="confirmOkBtn">🗑 ลบ</button>
    </div>
  </div>
</div>

<!-- MANAGE CATEGORIES MODAL -->
<div class="overlay" id="manageCatModal">
  <div class="modal" style="max-width:420px">
    <div class="modal-header">
      <h2>จัดการหมวดหมู่</h2>
      <button class="btn btn-ghost" onclick="closeModal('manageCatModal')">✕</button>
    </div>
    <div class="modal-body">
      <p style="font-size:12px;color:var(--muted);margin-bottom:14px">ลากเพื่อเรียงลำดับ • กด ✏️ เปลี่ยนชื่อ • กด 🗑 ลบ</p>
      <div id="catSortList"></div>
      <div style="margin-top:14px">
        <button class="btn btn-outline btn-sm" style="width:100%" onclick="closeModal('manageCatModal');openAddCategory()">+ เพิ่มหมวดหมู่ใหม่</button>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-accent" onclick="closeModal('manageCatModal')">✅ เสร็จสิ้น</button>
    </div>
  </div>
</div>
<div class="overlay" id="editDetailModal">
  <div class="modal" style="max-width:560px">
    <div class="modal-header">
      <h2>แก้ไขข้อมูลส่วนลึก</h2>
      <button class="btn btn-ghost" onclick="closeModal('editDetailModal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group" style="margin-bottom:14px">
        <label>ความต้องการในชีวิต</label>
        <textarea id="ed_needs" placeholder="สิ่งที่เขาต้องการในชีวิต..."></textarea>
      </div>
      <div class="form-group" style="margin-bottom:14px">
        <label>สิ่งที่ชอบ</label>
        <textarea id="ed_likes" placeholder="งานอดิเรก, ความชอบ..."></textarea>
      </div>
      <div class="form-group" style="margin-bottom:14px">
        <label>ครอบครัว</label>
        <textarea id="ed_family" placeholder="ข้อมูลครอบครัว..."></textarea>
      </div>
      <div class="form-group">
        <label>ทั่วไป (พื้นหลัง, ประสบการณ์, เหตุผลที่อยู่ที่นี่)</label>
        <textarea id="ed_general" placeholder="เช่น ทำธุรกิจมาหลายอย่าง, อยากหาอะไรทำเพิ่ม, มาอยู่ที่นี้เพราะ..." style="min-height:90px"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('editDetailModal')">ยกเลิก</button>
      <button class="btn btn-accent" onclick="saveDetail()">💾 บันทึก</button>
    </div>
  </div>
</div>

<script>
// ─── STATE ───────────────────────────────────────────────────────────────────
let state = {
  categories: [],
  contacts: [],
  collapsed: {},
};
let editingContactId = null;
let viewingContactId = null;
const ratingValues = { active: 0, friendly: 0, money: 0, relation: 0 };

// ─── STORAGE ─────────────────────────────────────────────────────────────────
function save() {
  localStorage.setItem('contactListApp', JSON.stringify(state));
}
function load() {
  try {
    const d = localStorage.getItem('contactListApp');
    if (d) state = JSON.parse(d);
  } catch(e) {}
  // seed default category
  if (!state.categories.length) {
    state.categories.push({ id: uid(), name: 'ทั่วไป' });
    save();
  }
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
function stars(n) {
  let s = '';
  for (let i = 1; i <= 10; i++) s += `<span style="color:${i<=n?'#f59e0b':'#2e3350'};font-size:15px">★</span>`;
  return s;
}
function scoreTag(n) {
  if (!n) return '<span style="color:#7c83a8">—</span>';
  if (n >= 8) return `<span class="score-tag score-high">★${n}</span>`;
  if (n >= 5) return `<span class="score-tag score-mid">★${n}</span>`;
  return `<span class="score-tag score-low">★${n}</span>`;
}
function initials(name) {
  return name ? name.charAt(0).toUpperCase() : '?';
}
function getContact(id) { return state.contacts.find(c => c.id === id); }
function getCategoryName(id) {
  const c = state.categories.find(x => x.id === id);
  return c ? c.name : 'ไม่มีหมวดหมู่';
}

// ─── RATING SELECTOR ─────────────────────────────────────────────────────────
function buildRatingSelectors() {
  ['active','friendly','money','relation'].forEach(field => {
    const el = document.getElementById('rs_' + field);
    el.innerHTML = '';
    for (let i = 1; i <= 10; i++) {
      const s = document.createElement('span');
      s.className = 'star';
      s.textContent = '★';
      s.dataset.v = i;
      s.onclick = () => setRating(field, i);
      el.appendChild(s);
    }
  });
}
function setRating(field, val) {
  ratingValues[field] = val;
  const el = document.getElementById('rs_' + field);
  el.querySelectorAll('.star').forEach((s,i) => {
    s.classList.toggle('on', i < val);
  });
}
function loadRatings(contact) {
  ['active','friendly','money','relation'].forEach(f => {
    setRating(f, contact[f] || 0);
  });
}
function resetRatings() {
  ['active','friendly','money','relation'].forEach(f => setRating(f, 0));
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function renderAll() {
  const q = (document.getElementById('searchInput').value || '').trim().toLowerCase();
  const container = document.getElementById('categoriesContainer');
  container.innerHTML = '';

  // contacts sorted by category
  state.categories.forEach(cat => {
    let contacts = state.contacts.filter(c => c.categoryId === cat.id);
    if (q) contacts = contacts.filter(c => c.name.toLowerCase().includes(q));

    const block = document.createElement('div');
    block.className = 'category-block';
    const isOpen = !state.collapsed[cat.id];

    block.innerHTML = `
      <div class="category-header">
        <div class="category-title">
          <span class="chevron ${isOpen?'open':''}">▾</span>
          <span>${cat.name}</span>
          <span class="category-badge">${contacts.length}</span>
        </div>
        <div class="category-actions">
          <button class="btn btn-ghost btn-sm cat-hdr-rename">✏️</button>
          <button class="btn btn-ghost btn-sm cat-hdr-delete">🗑</button>
        </div>
      </div>
    `;
    block.querySelector('.category-header').addEventListener('click', () => toggleCategory(cat.id));
    block.querySelector('.category-actions').addEventListener('click', e => e.stopPropagation());
    block.querySelector('.cat-hdr-rename').addEventListener('click', e => { e.stopPropagation(); renameCategory(cat.id); });
    block.querySelector('.cat-hdr-delete').addEventListener('click', e => {
      e.stopPropagation();
      const count = state.contacts.filter(c => c.categoryId === cat.id).length;
      showConfirm(`ลบหมวดหมู่ "${cat.name}"${count ? ` (มีรายชื่อ ${count} คน)` : ''} ใช่ไหม?`, () => {
        state.categories = state.categories.filter(c => c.id !== cat.id);
        save();
        renderAll();
      });
    });

    if (isOpen) {
      if (contacts.length === 0) {
        block.innerHTML += `<div class="empty-state"><div class="icon">👤</div><div>ยังไม่มีรายชื่อในหมวดนี้</div></div>`;
      } else {
        // global sequence number
        const globalSeq = (c) => state.contacts.indexOf(state.contacts.find(x => x.id === c.id)) + 1;
        block.innerHTML += `
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>#</th>
                  <th>ชื่อ</th>
                  <th>อายุ</th>
                  <th>สถานะ</th>
                  <th>พื้นหลัง</th>
                  <th>Active</th>
                  <th>Friendly</th>
                  <th>Money</th>
                  <th>Relation</th>
                  <th></th>
                </tr>
              </thead>
              <tbody>
                ${contacts.map((c,i) => `
                  <tr onclick="openDetail('${c.id}')">
                    <td class="seq-num">${globalSeq(c)}</td>
                    <td class="name-cell">${c.name}</td>
                    <td>${c.age||'—'}</td>
                    <td>${c.status||'—'}</td>
                    <td style="max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--muted);font-size:12px">${c.background||'—'}</td>
                    <td>${scoreTag(c.active)}</td>
                    <td>${scoreTag(c.friendly)}</td>
                    <td>${scoreTag(c.money)}</td>
                    <td>${scoreTag(c.relation)}</td>
                    <td onclick="event.stopPropagation()">
                      <button class="btn btn-ghost btn-sm" onclick="openEdit('${c.id}')">✏️</button>
                    </td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        `;
      }
    }

    container.appendChild(block);
  });

  // uncategorized
  let orphans = state.contacts.filter(c => !state.categories.find(cat => cat.id === c.categoryId));
  if (q) orphans = orphans.filter(c => c.name.toLowerCase().includes(q));
  if (orphans.length) {
    const block = document.createElement('div');
    block.className = 'category-block';
    block.innerHTML = `<div class="category-header"><div class="category-title">⚠️ ไม่มีหมวดหมู่</div></div>
      <div class="table-wrap"><table><thead><tr><th>#</th><th>ชื่อ</th><th>สถานะ</th><th>Active</th><th>Friendly</th><th>Money</th><th>Relation</th></tr></thead>
      <tbody>${orphans.map((c,i)=>`<tr onclick="openDetail('${c.id}')"><td class="seq-num">${i+1}</td><td class="name-cell">${c.name}</td><td>${c.status||'—'}</td><td>${scoreTag(c.active)}</td><td>${scoreTag(c.friendly)}</td><td>${scoreTag(c.money)}</td><td>${scoreTag(c.relation)}</td></tr>`).join('')}</tbody></table></div>`;
    container.appendChild(block);
  }

  if (!state.categories.length && !orphans.length) {
    container.innerHTML = `<div class="empty-state"><div class="icon">📋</div><div>ยังไม่มีข้อมูล กด <b>+ เพิ่มรายชื่อ</b> เพื่อเริ่มต้น</div></div>`;
  }
}

function toggleCategory(id) {
  state.collapsed[id] = !state.collapsed[id];
  save();
  renderAll();
}

// ─── MANAGE CATEGORIES (sort + delete) ───────────────────────────────────────
function openManageCategories() {
  renderCatSortList();
  showModal('manageCatModal');
}

function renderCatSortList() {
  const list = document.getElementById('catSortList');
  list.innerHTML = '';
  state.categories.forEach((cat, idx) => {
    const count = state.contacts.filter(c => c.categoryId === cat.id).length;
    const item = document.createElement('div');
    item.className = 'cat-sort-item';
    item.draggable = true;
    item.dataset.id = cat.id;
    item.innerHTML = `
      <span class="drag-handle">☰</span>
      <span class="cat-sort-name">${cat.name}</span>
      <span class="cat-sort-count">${count} คน</span>
      <button class="btn btn-ghost btn-sm cat-rename-btn">✏️</button>
      <button class="btn btn-ghost btn-sm cat-delete-btn" style="color:var(--danger)">🗑</button>
    `;
    item.querySelector('.cat-rename-btn').addEventListener('click', e => {
      e.stopPropagation();
      renameCatFromManage(cat.id);
    });
    item.querySelector('.cat-delete-btn').addEventListener('click', e => {
      e.stopPropagation();
      deleteCatFromManage(cat.id);
    });
    // drag events
    item.addEventListener('dragstart', e => {
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', cat.id);
      item.classList.add('dragging');
    });
    item.addEventListener('dragend', () => item.classList.remove('dragging'));
    item.addEventListener('dragover', e => { e.preventDefault(); item.classList.add('drag-over'); });
    item.addEventListener('dragleave', () => item.classList.remove('drag-over'));
    item.addEventListener('drop', e => {
      e.preventDefault();
      item.classList.remove('drag-over');
      const fromId = e.dataTransfer.getData('text/plain');
      const toId = cat.id;
      if (fromId === toId) return;
      const fromIdx = state.categories.findIndex(c => c.id === fromId);
      const toIdx = state.categories.findIndex(c => c.id === toId);
      const [moved] = state.categories.splice(fromIdx, 1);
      state.categories.splice(toIdx, 0, moved);
      save();
      renderCatSortList();
      renderAll();
    });
    list.appendChild(item);
  });
  if (!state.categories.length) {
    list.innerHTML = `<div style="color:var(--muted);text-align:center;padding:20px;font-size:13px">ยังไม่มีหมวดหมู่</div>`;
  }
}

function renameCatFromManage(id) {
  closeModal('manageCatModal');
  renameCategory(id);
}
function showConfirm(msg, onOk) {
  document.getElementById('confirmMsg').textContent = msg;
  const btn = document.getElementById('confirmOkBtn');
  btn.onclick = () => { closeModal('confirmModal'); onOk(); };
  showModal('confirmModal');
}

function deleteCatFromManage(id) {
  const cat = state.categories.find(c => c.id === id);
  if (!cat) return;
  const count = state.contacts.filter(c => c.categoryId === id).length;
  const msg = `ลบหมวดหมู่ "${cat.name}"${count ? ` (มีรายชื่อ ${count} คน)` : ''} ใช่ไหม?`;
  showConfirm(msg, () => {
    state.categories = state.categories.filter(c => c.id !== id);
    save();
    renderAll();
    renderCatSortList();
  });
}


function populateCategoryDropdown() {
  const sel = document.getElementById('f_category');
  sel.innerHTML = state.categories.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
}

function openAddCategory() {
  document.getElementById('catModalTitle').textContent = 'เพิ่มหมวดหมู่ใหม่';
  document.getElementById('f_catName').value = '';
  document.getElementById('f_catName').dataset.editId = '';
  showModal('categoryModal');
}
function renameCategory(id) {
  const cat = state.categories.find(c => c.id === id);
  if (!cat) return;
  document.getElementById('catModalTitle').textContent = 'แก้ไขชื่อหมวดหมู่';
  document.getElementById('f_catName').value = cat.name;
  document.getElementById('f_catName').dataset.editId = id;
  showModal('categoryModal');
}
function saveCategory() {
  const name = document.getElementById('f_catName').value.trim();
  if (!name) return alert('กรุณาใส่ชื่อหมวดหมู่');
  const editId = document.getElementById('f_catName').dataset.editId;
  if (editId) {
    const c = state.categories.find(x => x.id === editId);
    if (c) c.name = name;
  } else {
    state.categories.push({ id: uid(), name });
  }
  save();
  closeModal('categoryModal');
  renderAll();
}
function deleteCategory(id) {
  const cat = state.categories.find(c => c.id === id);
  if (!cat) return;
  const count = state.contacts.filter(c => c.categoryId === id).length;
  if (!confirm(`ลบหมวดหมู่ "${cat.name}"${count?` (มีรายชื่อ ${count} คน)`:''} ใช่ไหม?`)) return;
  state.categories = state.categories.filter(c => c.id !== id);
  save();
  renderAll();
}

// ─── CONTACT CRUD ─────────────────────────────────────────────────────────────
function openAddContact() {
  editingContactId = null;
  document.getElementById('contactModalTitle').textContent = 'เพิ่มรายชื่อใหม่';
  ['f_name','f_age','f_status','f_background','f_note'].forEach(id => document.getElementById(id).value = '');
  populateCategoryDropdown();
  buildRatingSelectors();
  resetRatings();
  showModal('contactModal');
}
function openEdit(id) {
  const c = getContact(id);
  if (!c) return;
  editingContactId = id;
  document.getElementById('contactModalTitle').textContent = 'แก้ไขรายชื่อ';
  document.getElementById('f_name').value = c.name || '';
  document.getElementById('f_age').value = c.age || '';
  document.getElementById('f_status').value = c.status || '';  document.getElementById('f_background').value = c.background || '';
  document.getElementById('f_note').value = c.note || '';
  populateCategoryDropdown();
  document.getElementById('f_category').value = c.categoryId || '';
  buildRatingSelectors();
  loadRatings(c);
  showModal('contactModal');
}
function saveContact() {
  const name = document.getElementById('f_name').value.trim();
  if (!name) return alert('กรุณาใส่ชื่อ');
  const data = {
    name,
    age: document.getElementById('f_age').value || '',
    status: document.getElementById('f_status').value || '',
    background: document.getElementById('f_background').value.trim(),
    categoryId: document.getElementById('f_category').value || '',
    note: document.getElementById('f_note').value.trim(),
    active: ratingValues.active,
    friendly: ratingValues.friendly,
    money: ratingValues.money,
    relation: ratingValues.relation,
  };
  if (editingContactId) {
    const c = getContact(editingContactId);
    Object.assign(c, data);
  } else {
    state.contacts.push({ id: uid(), ...data, needs:'', likes:'', family:'', general:'' });
  }
  save();
  closeModal('contactModal');
  renderAll();
}

// ─── DETAIL VIEW ──────────────────────────────────────────────────────────────
function openDetail(id) {
  viewingContactId = id;
  renderDetail(id);
  showModal('detailModal');
}
function renderDetail(id) {
  const c = getContact(id);
  if (!c) return;
  document.getElementById('detailTitle').textContent = c.name;
  const body = document.getElementById('detailBody');
  body.innerHTML = `
    <div class="profile-top">
      <div class="avatar">${initials(c.name)}</div>
      <div>
        <div class="profile-name">${c.name}</div>
        <div class="profile-meta">${c.age ? `อายุ ${c.age} ปี` : ''} ${c.status ? `• ${c.status}` : ''} ${c.background ? `• ${c.background}` : ''}</div>
        <div class="profile-meta" style="margin-top:3px">หมวด: ${getCategoryName(c.categoryId)}</div>
      </div>
    </div>

    <div class="ratings-grid" style="margin-bottom:20px">
      <div class="rating-card"><div class="r-label">Active</div><div class="r-stars">${stars(c.active||0)}</div></div>
      <div class="rating-card"><div class="r-label">Friendly</div><div class="r-stars">${stars(c.friendly||0)}</div></div>

      <div class="detail-tab" onclick="switchTab(this,'tab-family')">👨‍👩‍👧 ครอบครัว</div>
      <div class="detail-tab" onclick="switchTab(this,'tab-general')">📝 ทั่วไป</div>
      ${c.note ? `<div class="detail-tab" onclick="switchTab(this,'tab-note')">🗒 หมายเหตุ</div>` : ''}
    </div>

    <div id="tab-needs" class="tab-panel active">
      <div class="section-title">ความต้องการในชีวิต</div>
      <div class="note-block">${c.needs || '<span class="note-empty">ยังไม่มีข้อมูล</span>'}</div>
    </div>
    <div id="tab-likes" class="tab-panel">
      <div class="section-title">สิ่งที่ชอบ</div>
      <div class="note-block">${c.likes || '<span class="note-empty">ยังไม่มีข้อมูล</span>'}</div>
    </div>
    <div id="tab-family" class="tab-panel">
      <div class="section-title">ครอบครัว</div>
      <div class="note-block">${c.family || '<span class="note-empty">ยังไม่มีข้อมูล</span>'}</div>
    </div>
    <div id="tab-general" class="tab-panel">
      <div class="section-title">ทั่วไป</div>
      <div class="note-block">${c.general || '<span class="note-empty">ยังไม่มีข้อมูล</span>'}</div>
    </div>
    ${c.note ? `<div id="tab-note" class="tab-panel"><div class="section-title">หมายเหตุ</div><div class="note-block">${c.note}</div></div>` : ''}

    <div style="margin-top:16px">
      <button class="btn btn-outline btn-sm" onclick="openEditDetail('${c.id}')">✏️ แก้ไขข้อมูลส่วนลึก</button>
    </div>
  `;

function switchTab(el, tabId) {
  el.closest('.modal-body').querySelectorAll('.detail-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  el.closest('.modal-body').querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById(tabId).classList.add('active');
}

function editCurrentContact() {
  closeModal('detailModal');
  openEdit(viewingContactId);
}
function deleteCurrentContact() {
  const c = getContact(viewingContactId);
  if (!c) return;
  if (!confirm(`ลบ "${c.name}" ใช่ไหม?`)) return;
  state.contacts = state.contacts.filter(x => x.id !== viewingContactId);
  save();
  closeModal('detailModal');
  renderAll();
}

load();

// ─── PWA SETUP ────────────────────────────────────────────────────────────────
(function() {
  // Inline SVG icon as data URI (amber circle with person)
  const iconSvg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><rect width="512" height="512" rx="100" fill="#0f1117"/><rect width="512" height="512" rx="100" fill="#1a1d27"/><text x="256" y="320" font-size="240" text-anchor="middle" fill="#f59e0b">📋</text></svg>`;
  const iconUrl = 'data:image/svg+xml,' + encodeURIComponent(iconSvg);

  // Create manifest blob
  const manifest = {
    name: 'List รายชื่อ',
    short_name: 'รายชื่อ',
    description: 'แอพจัดการรายชื่อ Prospecting',
    start_url: '.',
    display: 'standalone',
    background_color: '#0f1117',
    theme_color: '#0f1117',
    orientation: 'portrait',
    icons: [
      { src: iconUrl, sizes: '192x192', type: 'image/svg+xml' },
      { src: iconUrl, sizes: '512x512', type: 'image/svg+xml', purpose: 'any maskable' }
    ]
  };
  const manifestBlob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
  const manifestURL = URL.createObjectURL(manifestBlob);
  document.getElementById('pwa-manifest').href = manifestURL;

  // Register Service Worker inline via blob
  const swCode = `
    const CACHE = 'contact-list-v1';
    self.addEventListener('install', e => {
      self.skipWaiting();
    });
    self.addEventListener('activate', e => {
      e.waitUntil(clients.claim());
    });
    self.addEventListener('fetch', e => {
      if (e.request.method !== 'GET') return;
      e.respondWith(
        caches.open(CACHE).then(cache =>
          fetch(e.request).then(res => {
            cache.put(e.request, res.clone());
            return res;
          }).catch(() => caches.match(e.request))
        )
      );
    });
  `;
  const swBlob = new Blob([swCode], { type: 'application/javascript' });
  const swURL = URL.createObjectURL(swBlob);
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register(swURL, { type: 'classic' }).catch(() => {});
  }

  // Install prompt
  let deferredPrompt = null;
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
    document.getElementById('installBtn').style.display = 'inline-flex';
  });
  window.addEventListener('appinstalled', () => {
    document.getElementById('installBtn').style.display = 'none';
    deferredPrompt = null;
  });
  window.installPWA = async () => {
    if (!deferredPrompt) {
      alert('วิธีติดตั้ง:\n📱 iOS: กด Share → "Add to Home Screen"\n🤖 Android: กด ⋮ เมนู → "Add to Home Screen"');
      return;
    }
    deferredPrompt.prompt();
    await deferredPrompt.userChoice;
    deferredPrompt = null;
    document.getElementById('installBtn').style.display = 'none';
  };
})();
